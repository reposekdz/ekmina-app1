name: ekimina_mobile
description: E-Kimina Rwanda - Digital Savings Group Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Navigation
  go_router: ^13.0.0
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # HTTP Client
  dio: ^5.4.0
  retrofit: ^4.0.3
  json_annotation: ^4.8.1
  
  # Biometrics & Security
  local_auth: ^2.1.7
  flutter_secure_storage: ^9.0.0
  encrypt: ^5.0.3
  
  # UI Components
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^2.7.0
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^1.1.0
  pull_to_refresh: ^2.0.0
  
  # Utils
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  uuid: ^4.3.3
  logger: ^2.0.2
  connectivity_plus: ^5.0.2
  device_info_plus: ^9.1.1
  package_info_plus: ^9.0.0
  
  # Icons
  cupertino_icons: ^1.0.6
  font_awesome_flutter: ^10.6.0
  
  # Notifications & Firebase
  flutter_local_notifications: ^16.3.0
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.9
  firebase_analytics: ^10.8.0
  timeago: ^3.6.0
  
  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.5
  
  # Charts & Visualization
  fl_chart: ^0.66.0
  syncfusion_flutter_charts: ^28.1.33
  
  # PDF & Documents
  pdf: ^3.10.7
  printing: ^5.12.0
  
  # Image Handling
  image_picker: ^1.0.7
  image_cropper: ^5.0.1
  
  # Payments
  flutterwave_standard: ^1.0.8
  
  # Additional
  share_plus: ^7.2.1
  url_launcher: ^6.2.3
  flutter_carousel_widget: ^2.0.3
  
  # Permissions
  permission_handler: ^11.2.0
  
  # WebView
  webview_flutter: ^4.5.0
  
  # Animations
  rive: ^0.12.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  retrofit_generator: ^8.0.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  mockito: ^5.4.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
    - Rwanda/data.json
