name: ekimina_mobile
description: E-Kimina Rwanda - Digital Savings Group Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Navigation
  go_router: ^14.0.0
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # HTTP Client
  dio: ^5.5.0
  retrofit: ^4.1.0
  json_annotation: ^4.9.0
  
  # Biometrics & Security
  local_auth: ^2.2.0
  flutter_secure_storage: ^9.2.2
  encrypt: ^5.0.3
  
  # UI Components
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^1.1.0
  pull_to_refresh: ^2.0.0
  
  # Utils
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  uuid: ^4.4.0
  logger: ^2.3.0
  connectivity_plus: ^6.0.3
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0
  
  # Icons
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.7.0
  lucide_icons: ^0.257.0
  
  # Notifications & Firebase
  flutter_local_notifications: ^17.1.2
  firebase_core: ^3.1.1
  firebase_messaging: ^15.0.3
  firebase_analytics: ^11.2.0
  timeago: ^3.6.1
  
  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1
  
  # Charts & Visualization
  fl_chart: ^0.68.0
  syncfusion_flutter_charts: ^28.2.12
  
  # PDF & Documents
  pdf: ^3.10.8
  printing: ^5.13.0
  
  # Image Handling
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  
  # Payments
  flutterwave_standard: ^1.1.0
  
  # Additional
  share_plus: ^10.1.0
  url_launcher: ^6.3.0
  flutter_carousel_widget: ^2.0.3
  
  # Permissions
  permission_handler: ^11.3.1
  
  # WebView
  webview_flutter: ^4.8.0
  
  # Animations
  rive: ^0.13.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  retrofit_generator: ^8.1.0
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  mockito: ^5.4.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
    - Rwanda/data.json
